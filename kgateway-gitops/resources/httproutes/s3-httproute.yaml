# Backend confirmed via `kubectl get svc -n rook-ceph`: rook-ceph-rgw-external, port 80
# (same Service Caddy already proxies to).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: s3
  namespace: rook-ceph
spec:
  parentRefs:
    - name: cluster-gateway
      namespace: kgateway-system
      sectionName: https-s3
      group: gateway.networking.k8s.io
      kind: Gateway
  hostnames:
    - "s3.verticon.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: "/"
      backendRefs:
        - name: rook-ceph-rgw-external
          port: 80
          kind: Service
          group: ""
          weight: 1
