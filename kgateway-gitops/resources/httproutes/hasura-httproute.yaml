# Backend confirmed via `kubectl get svc -n hasura`: hasura, port 80.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hasura
  namespace: hasura
spec:
  parentRefs:
    - name: cluster-gateway
      namespace: kgateway-system
      sectionName: https-hasura
      group: gateway.networking.k8s.io
      kind: Gateway
  hostnames:
    - "hasura.verticon.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: "/"
      backendRefs:
        - name: hasura
          port: 80
          kind: Service
          group: ""
          weight: 1
