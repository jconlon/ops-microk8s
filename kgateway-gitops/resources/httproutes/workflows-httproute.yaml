# Backend confirmed via `kubectl get svc -n argo-workflows`: argo-workflows-server, port 2746.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: workflows
  namespace: argo-workflows
spec:
  parentRefs:
    - name: cluster-gateway
      namespace: kgateway-system
      sectionName: https-workflows
      group: gateway.networking.k8s.io
      kind: Gateway
  hostnames:
    - "workflows.verticon.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: "/"
      backendRefs:
        - name: argo-workflows-server
          port: 2746
          kind: Service
          group: ""
          weight: 1
