# Backend confirmed via `kubectl get svc -n vllm`: vllm-router-service, port 80
# (router-sport, OpenAI-compatible REST API). vLLM previously had no hostname/Caddy
# entry at all — this is a net-new addition, not a migration cutover (issue #108).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vllm
  namespace: vllm
spec:
  parentRefs:
    - name: cluster-gateway
      namespace: kgateway-system
      sectionName: https-vllm
      group: gateway.networking.k8s.io
      kind: Gateway
  hostnames:
    - "vllm.verticon.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: "/"
      backendRefs:
        - name: vllm-router-service
          port: 80
          kind: Service
          group: ""
          weight: 1
