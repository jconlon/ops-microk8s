# Backend confirmed via `kubectl get svc -n loki loki-gateway`: port 80 (http-metrics),
# the same in-cluster gateway service Caddy currently proxies to.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: loki
  namespace: loki
spec:
  parentRefs:
    - name: cluster-gateway
      namespace: kgateway-system
      sectionName: https-loki
      group: gateway.networking.k8s.io
      kind: Gateway
  hostnames:
    - "loki.verticon.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: "/"
      backendRefs:
        - name: loki-gateway
          port: 80
          kind: Service
          group: ""
          weight: 1
