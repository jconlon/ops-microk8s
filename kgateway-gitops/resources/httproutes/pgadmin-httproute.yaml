# Namespace matches the pgadmin Service's actual namespace (postgresql-system,
# confirmed via `kubectl get svc -n pgadmin` / `kubectl get svc -A | grep pgadmin`
# — the plan's assumed "pgadmin" namespace does not exist). Same-namespace
# backendRefs avoid needing a ReferenceGrant.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: pgadmin
  namespace: postgresql-system
spec:
  parentRefs:
    - name: cluster-gateway
      namespace: kgateway-system
      sectionName: https-pgadmin
  hostnames:
    - "pgadmin.verticon.com"
  rules:
    - backendRefs:
        - name: pgadmin
          port: 80
          kind: Service
          group: ""
          weight: 1
