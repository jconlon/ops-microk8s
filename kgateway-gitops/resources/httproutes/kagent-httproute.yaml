# Backend confirmed via `kubectl get svc -n kagent`: kagent-ui, port 8080.
# Minimum-security exposure (lab network, no auth in front) per issue #111 —
# no oauth2-proxy configured.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kagent
  namespace: kagent
spec:
  parentRefs:
    - name: cluster-gateway
      namespace: kgateway-system
      sectionName: https-kagent
      group: gateway.networking.k8s.io
      kind: Gateway
  hostnames:
    - "kagent.verticon.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: "/"
      backendRefs:
        - name: kagent-ui
          port: 8080
          kind: Service
          group: ""
          weight: 1
      # kagent conversations involve sequential tool calls, LLM generation, and
      # sub-agent delegation (e.g. observability-agent -> promql-agent) that can
      # easily exceed kgateway's default route timeout, surfacing in the UI as a
      # "streaming network failure" mid-response (issue #111).
      timeouts:
        request: 300s
        backendRequest: 300s
