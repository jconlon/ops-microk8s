# Backend confirmed via `kubectl get svc -A | grep kafka-ui`: kafka-ui, kafka-system namespace, port 80.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kafka-ui
  namespace: kafka-system
spec:
  parentRefs:
    - name: cluster-gateway
      namespace: kgateway-system
      sectionName: https-kafka
  hostnames:
    - "kafka.verticon.com"
  rules:
    - backendRefs:
        - name: kafka-ui
          port: 80
