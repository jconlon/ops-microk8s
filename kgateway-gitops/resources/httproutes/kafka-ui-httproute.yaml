# Backend confirmed via `kubectl get svc -A | grep kafka-ui`: kafka-ui, kafka-system namespace, port 80.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kafka-ui
  namespace: kafka-system
spec:
  parentRefs:
    - name: cluster-gateway
      namespace: kgateway-system
      sectionName: https-kafka
      group: gateway.networking.k8s.io
      kind: Gateway
  hostnames:
    - "kafka.verticon.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: "/"
      backendRefs:
        - name: kafka-ui
          port: 80
          kind: Service
          group: ""
          weight: 1
