# Backend confirmed via `kubectl get svc -n monitoring grafana`: port 80 (http-web).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: monitoring
spec:
  parentRefs:
    - name: cluster-gateway
      namespace: kgateway-system
      sectionName: https-grafana
      group: gateway.networking.k8s.io
      kind: Gateway
  hostnames:
    - "grafana.verticon.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: "/"
      backendRefs:
        - name: grafana
          port: 80
          kind: Service
          group: ""
          weight: 1
