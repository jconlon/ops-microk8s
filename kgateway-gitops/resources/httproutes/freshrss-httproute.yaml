# Backend confirmed via `kubectl get svc -n freshrss`: freshrss, port 80.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: freshrss
  namespace: freshrss
spec:
  parentRefs:
    - name: cluster-gateway
      namespace: kgateway-system
      sectionName: https-freshrss
      group: gateway.networking.k8s.io
      kind: Gateway
  hostnames:
    - "freshrss.verticon.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: "/"
      backendRefs:
        - name: freshrss
          port: 80
          kind: Service
          group: ""
          weight: 1
