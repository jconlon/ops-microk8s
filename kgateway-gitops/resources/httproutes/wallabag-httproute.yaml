# Backend confirmed via `kubectl get svc -n wallabag`: wallabag, port 80.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: wallabag
  namespace: wallabag
spec:
  parentRefs:
    - name: cluster-gateway
      namespace: kgateway-system
      sectionName: https-wallabag
      group: gateway.networking.k8s.io
      kind: Gateway
  hostnames:
    - "wallabag.verticon.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: "/"
      backendRefs:
        - name: wallabag
          port: 80
          kind: Service
          group: ""
          weight: 1
