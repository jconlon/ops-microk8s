# Backend confirmed via `kubectl get svc -n wallabag`: wallabag, port 80.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: wallabag
  namespace: wallabag
spec:
  parentRefs:
    - name: cluster-gateway
      namespace: kgateway-system
      sectionName: https-wallabag
  hostnames:
    - "wallabag.verticon.com"
  rules:
    - backendRefs:
        - name: wallabag
          port: 80
