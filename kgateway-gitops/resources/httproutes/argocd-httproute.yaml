# Backend confirmed via `kubectl get svc -n argocd`: argocd-server, port 80.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd
  namespace: argocd
spec:
  parentRefs:
    - name: cluster-gateway
      namespace: kgateway-system
      sectionName: https-argocd
      group: gateway.networking.k8s.io
      kind: Gateway
  hostnames:
    - "argocd.verticon.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: "/"
      backendRefs:
        - name: argocd-server
          port: 80
          kind: Service
          group: ""
          weight: 1
