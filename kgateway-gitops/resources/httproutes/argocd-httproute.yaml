# Backend confirmed via `kubectl get svc -n argocd`: argocd-server, port 80.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd
  namespace: argocd
spec:
  parentRefs:
    - name: cluster-gateway
      namespace: kgateway-system
      sectionName: https-argocd
  hostnames:
    - "argocd.verticon.com"
  rules:
    - backendRefs:
        - name: argocd-server
          port: 80
