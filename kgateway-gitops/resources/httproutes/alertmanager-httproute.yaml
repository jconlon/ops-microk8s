# Backend confirmed via `kubectl get svc -A | grep alertmanager`:
# alertmanager-kube-promethe-alertmanager, monitoring namespace, port 80 (http-web).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: alertmanager
  namespace: monitoring
spec:
  parentRefs:
    - name: cluster-gateway
      namespace: kgateway-system
      sectionName: https-alertmanager
  hostnames:
    - "alertmanager.verticon.com"
  rules:
    - backendRefs:
        - name: alertmanager-kube-promethe-alertmanager
          port: 80
