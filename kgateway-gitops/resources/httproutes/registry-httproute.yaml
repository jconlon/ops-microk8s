# Backend confirmed via `kubectl get svc -n harbor harbor`: port 80.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: registry
  namespace: harbor
spec:
  parentRefs:
    - name: cluster-gateway
      namespace: kgateway-system
      sectionName: https-registry
      group: gateway.networking.k8s.io
      kind: Gateway
  hostnames:
    - "registry.verticon.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: "/"
      backendRefs:
        - name: harbor
          port: 80
          kind: Service
          group: ""
          weight: 1
