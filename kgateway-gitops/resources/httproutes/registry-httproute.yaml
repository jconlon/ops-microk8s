# Backend confirmed via `kubectl get svc -n harbor harbor`: port 80.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: registry
  namespace: harbor
spec:
  parentRefs:
    - name: cluster-gateway
      namespace: kgateway-system
      sectionName: https-registry
  hostnames:
    - "registry.verticon.com"
  rules:
    - backendRefs:
        - name: harbor
          port: 80
