# Backend: jellyfin service in jellyfin namespace, port 8096 (see jellyfin-gitops/service.yaml).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: jellyfin
  namespace: jellyfin
spec:
  parentRefs:
    - name: cluster-gateway
      namespace: kgateway-system
      sectionName: https-jellyfin
      group: gateway.networking.k8s.io
      kind: Gateway
  hostnames:
    - "jellyfin.verticon.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: "/"
      backendRefs:
        - name: jellyfin
          port: 8096
          kind: Service
          group: ""
          weight: 1
