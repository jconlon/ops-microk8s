apiVersion: v1
kind: Service
metadata:
  name: cosmo-router
  namespace: cosmo
  labels:
    app.kubernetes.io/name: cosmo-router
    app.kubernetes.io/component: graphql-gateway
  annotations:
    metallb.universe.tf/loadBalancerIPs: "192.168.0.216"
spec:
  type: LoadBalancer
  ports:
    - name: graphql
      port: 3002
      targetPort: 3002
      protocol: TCP
    - name: mcp
      port: 5025
      targetPort: 5025
      protocol: TCP
  selector:
    app.kubernetes.io/name: cosmo-router
