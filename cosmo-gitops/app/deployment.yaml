apiVersion: apps/v1
kind: Deployment
metadata:
  name: cosmo-router
  namespace: cosmo
  labels:
    app.kubernetes.io/name: cosmo-router
    app.kubernetes.io/component: graphql-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cosmo-router
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cosmo-router
        app.kubernetes.io/component: graphql-gateway
    spec:
      enableServiceLinks: false
      containers:
        - name: router
          # Pin to a specific release tag before production use.
          # See: https://github.com/wundergraph/cosmo/releases
          image: ghcr.io/wundergraph/cosmo/router:latest
          ports:
            - containerPort: 3002
              name: graphql
            - containerPort: 5025
              name: mcp
          env:
            - name: CONFIG_PATH
              value: "/etc/cosmo/config.yaml"
          volumeMounts:
            - name: router-config
              mountPath: /etc/cosmo/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: router-json
              mountPath: /etc/cosmo/router.json
              subPath: router.json
              readOnly: true
            - name: operations
              mountPath: /operations
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health/live
              port: 3002
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: router-config
          configMap:
            name: cosmo-router-config
        - name: router-json
          configMap:
            name: cosmo-router-json
        - name: operations
          configMap:
            name: cosmo-router-operations
