apiVersion: v1
kind: ConfigMap
metadata:
  name: cosmo-router-json
  namespace: cosmo
  labels:
    app.kubernetes.io/name: cosmo-router
    app.kubernetes.io/component: execution-config
  annotations:
    # router.json is managed out-of-band (too large for ArgoCD annotation limit).
    # After Hasura schema changes, regenerate and apply with:
    #
    #   wgc router compose -i cosmo-gitops/config/compose.yaml -o /tmp/router.json
    #   kubectl create configmap cosmo-router-json --namespace cosmo \
    #     --from-file=router.json=/tmp/router.json \
    #     --dry-run=client -o yaml | kubectl apply --server-side -f -
    #   kubectl rollout restart deployment/cosmo-router -n cosmo
data:
  router.json: |
    {
      "version": "1",
      "engineConfig": {
        "defaultFlushInterval": "500",
        "datasourceConfigurations": [],
        "fieldConfigurations": [],
        "graphqlSchema": "",
        "stringStorage": {}
      },
      "subgraphs": []
    }
