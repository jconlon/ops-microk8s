apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kagent
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  sources:
    # See kagent-crds-app.yaml comment — requires the same registered OCI
    # repo credential (argocd repo add ghcr.io/kagent-dev/kagent/helm
    # --type helm --enable-oci).
    - repoURL: ghcr.io/kagent-dev/kagent/helm
      chart: kagent
      targetRevision: "0.9.11"
      helm:
        valueFiles:
          - $values/kagent-gitops/helm/kagent-values.yaml
    - repoURL: https://github.com/jconlon/ops-microk8s
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: kagent
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
