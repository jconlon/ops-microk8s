apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kgateway-crds
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    # REQUIRES a registered OCI repo credential (one-time, not GitOps-managed —
    # same class of manual bootstrap as Harbor/Loki S3 secrets):
    #   argocd repo add cr.kgateway.dev/kgateway-dev/charts --type helm --enable-oci
    # cr.kgateway.dev does not support ArgoCD's anonymous inline OCI form
    # (repoURL as the full chart path, or as a bare host + nested path) —
    # both produced "not a valid chart repository" / dropped path segments.
    # Only registering the exact repoURL below as an OCI Helm repo, then using
    # chart: as a single leaf segment under it, works.
    repoURL: cr.kgateway.dev/kgateway-dev/charts
    chart: kgateway-crds
    targetRevision: "v2.3.5"
  destination:
    server: https://kubernetes.default.svc
    namespace: kgateway-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
