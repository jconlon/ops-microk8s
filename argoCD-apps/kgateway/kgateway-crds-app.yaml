apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kgateway-crds
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    # cr.kgateway.dev stores each chart at its own full OCI path (confirmed via
    # `helm pull` — the repoURL+chart split ArgoCD uses for shared namespaces
    # like registry-1.docker.io/bitnamicharts does not apply here). Use the
    # path-based OCI form instead: full chart path in repoURL, path: . as root.
    repoURL: oci://cr.kgateway.dev/kgateway-dev/charts/kgateway-crds
    path: .
    targetRevision: "v2.3.5"
  destination:
    server: https://kubernetes.default.svc
    namespace: kgateway-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
