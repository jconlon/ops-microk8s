apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kgateway
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  sources:
    # See kgateway-crds-app.yaml comment — requires the same registered OCI
    # repo credential (argocd repo add cr.kgateway.dev/kgateway-dev/charts
    # --type helm --enable-oci).
    - repoURL: cr.kgateway.dev/kgateway-dev/charts
      chart: kgateway
      targetRevision: "v2.3.5"
      helm:
        valueFiles:
          - $values/kgateway-gitops/helm/kgateway-values.yaml
    - repoURL: https://github.com/jconlon/ops-microk8s
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: kgateway-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
