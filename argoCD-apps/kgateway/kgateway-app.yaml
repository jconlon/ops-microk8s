apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kgateway
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  sources:
    # See kgateway-crds-app.yaml comment: cr.kgateway.dev charts use the
    # path-based OCI form (full chart path in repoURL + path: .), not the
    # repoURL+chart split used for shared-namespace registries.
    - repoURL: oci://cr.kgateway.dev/kgateway-dev/charts/kgateway
      path: .
      targetRevision: "v2.3.5"
      helm:
        valueFiles:
          - $values/kgateway-gitops/helm/kgateway-values.yaml
    - repoURL: https://github.com/jconlon/ops-microk8s
      targetRevision: migrate-to-kgateway
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: kgateway-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
