apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: argo-events-healthy
spec:
  description: Argo Events is deployed and the webhook EventSource is live
  concurrent: false
  timeouts:
    assert: 5m
    exec: 60s

  steps:
    - name: argo-events-argocd-app-synced
      description: Argo Events ArgoCD application is Synced and Healthy
      try:
        - assert:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Application
              metadata:
                name: argo-events
                namespace: argocd
              status:
                sync:
                  status: Synced
                health:
                  status: Healthy

    - name: argo-events-resources-argocd-app-synced
      description: Argo Events resources ArgoCD application is Synced
      try:
        - assert:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Application
              metadata:
                name: argo-events-resources
                namespace: argocd
              status:
                sync:
                  status: Synced

    - name: argo-events-controller-running
      description: Argo Events controller Deployment is available
      try:
        - assert:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: argo-events-controller-manager
                namespace: argo-events
              status:
                (availableReplicas >= `1`): true

    - name: argo-events-eventbus-deployed
      description: EventBus default is Configured and Deployed (v1.9.x uses conditions, not phase)
      try:
        - script:
            content: |
              # Argo Events v1.9.x uses status.conditions instead of status.phase.
              # Check that both Configured and Deployed conditions are True.
              CONFIGURED=$(kubectl get eventbus default -n argo-events \
                -o jsonpath='{.status.conditions[?(@.type=="Configured")].status}' 2>/dev/null)
              DEPLOYED=$(kubectl get eventbus default -n argo-events \
                -o jsonpath='{.status.conditions[?(@.type=="Deployed")].status}' 2>/dev/null)
              if [ "$CONFIGURED" = "True" ] && [ "$DEPLOYED" = "True" ]; then
                echo "EventBus is Configured and Deployed"
                exit 0
              fi
              echo "EventBus not ready ŌĆö Configured=$CONFIGURED Deployed=$DEPLOYED"
              exit 1

    - name: argo-events-eventsource-deployed
      description: git-push EventSource is Deployed and SourcesProvided (v1.9.x uses conditions)
      try:
        - script:
            content: |
              # Argo Events v1.9.x uses status.conditions instead of status.phase.
              # Check that Deployed and SourcesProvided conditions are True.
              DEPLOYED=$(kubectl get eventsource git-push -n argo-events \
                -o jsonpath='{.status.conditions[?(@.type=="Deployed")].status}' 2>/dev/null)
              SOURCES=$(kubectl get eventsource git-push -n argo-events \
                -o jsonpath='{.status.conditions[?(@.type=="SourcesProvided")].status}' 2>/dev/null)
              if [ "$DEPLOYED" = "True" ] && [ "$SOURCES" = "True" ]; then
                echo "EventSource is Deployed and SourcesProvided"
                exit 0
              fi
              echo "EventSource not ready ŌĆö Deployed=$DEPLOYED SourcesProvided=$SOURCES"
              exit 1

    - name: argo-events-sensor-deployed
      description: git-push Sensor is Deployed, DependenciesProvided, TriggersProvided
      try:
        - script:
            content: |
              # Argo Events v1.9.x uses status.conditions instead of status.phase.
              DEPLOYED=$(kubectl get sensor git-push -n argo-events \
                -o jsonpath='{.status.conditions[?(@.type=="Deployed")].status}' 2>/dev/null)
              DEPS=$(kubectl get sensor git-push -n argo-events \
                -o jsonpath='{.status.conditions[?(@.type=="DependenciesProvided")].status}' 2>/dev/null)
              TRIGGERS=$(kubectl get sensor git-push -n argo-events \
                -o jsonpath='{.status.conditions[?(@.type=="TriggersProvided")].status}' 2>/dev/null)
              if [ "$DEPLOYED" = "True" ] && [ "$DEPS" = "True" ] && [ "$TRIGGERS" = "True" ]; then
                echo "Sensor is Deployed, DependenciesProvided, TriggersProvided"
                exit 0
              fi
              echo "Sensor not ready ŌĆö Deployed=$DEPLOYED DepsProvided=$DEPS TriggersProvided=$TRIGGERS"
              exit 1

    - name: argo-events-service-has-ip
      description: git-push-eventsource-lb LoadBalancer service has MetalLB IP 192.168.0.221
      try:
        - script:
            content: |
              # The LoadBalancer service is named git-push-eventsource-lb (separate from
              # the ClusterIP service created by the EventSource controller).
              IP=$(kubectl get svc git-push-eventsource-lb -n argo-events \
                -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null)
              [ "$IP" = "192.168.0.221" ] || { echo "Expected 192.168.0.221, got: $IP"; exit 1; }
              echo "MetalLB IP confirmed: $IP"

    - name: argo-events-webhook-reachable
      description: Webhook endpoint is reachable at the MetalLB IP (POST returns 200)
      try:
        - script:
            timeout: 30s
            content: |
              STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
                -X POST http://192.168.0.221:12000/push \
                -H 'Content-Type: application/json' \
                -d '{"repo":"test","commit":"abc123"}' 2>/dev/null)
              [ "$STATUS" = "200" ] || { echo "Expected 200, got: $STATUS"; exit 1; }
              echo "Webhook endpoint returned 200"

    - name: argo-events-e2e-trigger
      description: POST to webhook triggers a git-push-build workflow within 60s
      try:
        - script:
            timeout: 90s
            content: |
              # Record existing workflows before triggering.
              # Use kubectl ŌĆö the argo CLI is not available in the chainsaw container.
              BEFORE=$(kubectl get workflow -n argo-workflows \
                --no-headers 2>/dev/null | grep "^git-push-" | wc -l)

              # POST the webhook payload
              curl -sf -X POST http://192.168.0.221:12000/push \
                -H 'Content-Type: application/json' \
                -d "{\"repo\":\"https://github.com/jconlon/test\",\"commit\":\"$(date +%s)\"}" \
                > /dev/null 2>&1

              # Poll for a new workflow (up to 60s)
              for i in $(seq 1 30); do
                AFTER=$(kubectl get workflow -n argo-workflows \
                  --no-headers 2>/dev/null | grep "^git-push-" | wc -l)
                if [ "$AFTER" -gt "$BEFORE" ]; then
                  echo "New git-push workflow detected (count: $AFTER)"
                  exit 0
                fi
                sleep 2
              done
              echo "No new git-push workflow detected within 60s"
              exit 1

    - name: argo-events-workflowtemplate-exists
      description: git-push-build WorkflowTemplate exists in argo-workflows
      try:
        - assert:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: WorkflowTemplate
              metadata:
                name: git-push-build
                namespace: argo-workflows
