apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: vllm-healthy
spec:
  description: vLLM ArgoCD app is Synced/Healthy, pod running on whale, OpenAI API responds
  concurrent: false
  timeouts:
    assert: 15m
    exec: 3m

  steps:

  - name: argocd-app-synced-and-healthy
    description: ArgoCD Application is Synced and Healthy
    try:
    - assert:
        resource:
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: vllm
            namespace: argocd
          status:
            sync:
              status: Synced
            health:
              status: Healthy

  - name: serving-pod-running-on-whale
    description: vLLM serving-engine pod is Running and scheduled on whale
    try:
    - assert:
        resource:
          apiVersion: v1
          kind: Pod
          metadata:
            namespace: vllm
            labels:
              app.kubernetes.io/component: serving-engine
          spec:
            nodeName: whale
          status:
            phase: Running

  - name: vllm-health-endpoint
    description: vLLM /health endpoint returns 200 via engine service ClusterIP
    try:
    - script:
        content: |
          SVC=$(kubectl get svc vllm-qwen25-7b-engine-service -n vllm -o jsonpath='{.spec.clusterIP}')
          curl -sf http://$SVC/health
          echo "Health check passed"

  - name: vllm-models-endpoint
    description: vLLM /v1/models lists the deployed model
    try:
    - script:
        content: |
          SVC=$(kubectl get svc vllm-qwen25-7b-engine-service -n vllm -o jsonpath='{.spec.clusterIP}')
          RESPONSE=$(curl -sf http://$SVC/v1/models)
          echo "$RESPONSE"
          echo "$RESPONSE" | grep -q '"object":"list"' || { echo "Unexpected /v1/models response"; exit 1; }
          echo "Models endpoint OK"

  - name: vllm-openai-chat-completion
    description: OpenAI-compatible chat completion returns a valid response
    try:
    - script:
        content: |
          SVC=$(kubectl get svc vllm-qwen25-7b-engine-service -n vllm -o jsonpath='{.spec.clusterIP}')
          RESPONSE=$(curl -sf http://$SVC/v1/chat/completions \
            -H "Content-Type: application/json" \
            -d '{
              "model": "Qwen/Qwen2.5-7B-Instruct-AWQ",
              "messages": [{"role": "user", "content": "Reply with exactly one word: OK"}],
              "max_tokens": 10,
              "temperature": 0
            }')
          echo "$RESPONSE"
          echo "$RESPONSE" | grep -q '"choices"' || { echo "No choices in response"; exit 1; }
          echo "Chat completion OK"
