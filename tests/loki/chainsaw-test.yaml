apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: loki-healthy
spec:
  description: Loki + Promtail log aggregation stack is healthy
  concurrent: false
  timeouts:
    assert: 5m
    exec: 60s

  steps:
    - name: loki-storage-cephobjectstoreuser-ready
      description: Loki Ceph object store user is Ready (S3 credentials provisioned)
      try:
        - assert:
            resource:
              apiVersion: ceph.rook.io/v1
              kind: CephObjectStoreUser
              metadata:
                name: loki-logs-user
                namespace: rook-ceph
              status:
                phase: Ready

    - name: loki-s3-credentials-secret-exists
      description: loki-s3-credentials secret exists in loki namespace with non-empty access key
      try:
        - script:
            content: |
              kubectl get secret loki-s3-credentials -n loki \
                -o jsonpath='{.data.AWS_ACCESS_KEY_ID}' | base64 -d | grep -qE '.{10,}' \
                || { echo "loki-s3-credentials secret missing or empty"; exit 1; }
              echo "loki-s3-credentials secret present with non-empty access key"

    - name: loki-argocd-app-synced
      description: Loki ArgoCD application is Synced and Healthy
      try:
        - assert:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Application
              metadata:
                name: loki
                namespace: argocd
              status:
                sync:
                  status: Synced
                health:
                  status: Healthy

    - name: promtail-argocd-app-synced
      description: Promtail ArgoCD application is Synced and Healthy
      try:
        - assert:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Application
              metadata:
                name: promtail
                namespace: argocd
              status:
                sync:
                  status: Synced
                health:
                  status: Healthy

    - name: loki-pod-running
      description: Loki single-binary pod is Running and ready
      try:
        - assert:
            resource:
              apiVersion: apps/v1
              kind: StatefulSet
              metadata:
                name: loki
                namespace: loki
              status:
                readyReplicas: 1

    - name: promtail-daemonset-ready
      description: Promtail DaemonSet has all 8 nodes covered
      try:
        - assert:
            resource:
              apiVersion: apps/v1
              kind: DaemonSet
              metadata:
                name: promtail
                namespace: loki
              status:
                numberReady: 8
                desiredNumberScheduled: 8

    - name: loki-service-has-ip
      description: Loki gateway LoadBalancer service has MetalLB IP 192.168.0.220
      try:
        - script:
            content: |
              IP=$(kubectl get svc loki-gateway -n loki -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null)
              [ "$IP" = "192.168.0.220" ] || { echo "Expected 192.168.0.220, got: $IP"; exit 1; }
              echo "MetalLB IP confirmed: $IP"

    - name: loki-ready-endpoint
      description: Loki /ready endpoint returns "ready" (log ingestion active)
      try:
        - script:
            timeout: 30s
            content: |
              # /ready is on Loki backend (port 3100), not proxied through the nginx gateway
              # Use kubectl exec to call it from inside the cluster
              RESULT=$(kubectl exec loki-0 -n loki -c loki -- wget -qO- http://localhost:3100/ready 2>/dev/null)
              echo "$RESULT" | grep -qi "ready" || { echo "Loki ready check failed: $RESULT"; exit 1; }
              echo "Loki /ready endpoint confirmed: $RESULT"

    - name: loki-has-labels
      description: Loki labels endpoint returns data (Promtail is shipping logs)
      try:
        - script:
            timeout: 30s
            content: |
              LABELS=$(curl -sf http://192.168.0.220/loki/api/v1/labels)
              echo "Labels response: $LABELS"
              echo "$LABELS" | grep -q '"data"' || { echo "No data field returned from Loki labels API"; exit 1; }
              LABEL_COUNT=$(echo "$LABELS" | python3 -c "import sys,json; d=json.load(sys.stdin); print(len(d.get('data', [])))")
              [ "$LABEL_COUNT" -gt 0 ] || { echo "Labels list is empty — Promtail may not be shipping logs"; exit 1; }
              echo "Loki labels confirmed: $LABEL_COUNT label(s) found"

    - name: loki-query-returns-logs
      description: Loki query API returns actual log lines from loki namespace
      try:
        - script:
            timeout: 60s
            content: |
              START=$(date -u -d '5 minutes ago' +%s)000000000
              END=$(date -u +%s)000000000
              RESULT=$(curl -sfG \
                --data-urlencode 'query={namespace="loki"}' \
                --data-urlencode "start=$START" \
                --data-urlencode "end=$END" \
                --data-urlencode "limit=5" \
                "http://192.168.0.220/loki/api/v1/query_range")
              echo "Query result: $RESULT"
              echo "$RESULT" | grep -q '"result"' || { echo "No result field in Loki query response"; exit 1; }
              STREAM_COUNT=$(echo "$RESULT" | python3 -c \
                "import sys,json; d=json.load(sys.stdin); print(len(d.get('data',{}).get('result',[])))")
              [ "$STREAM_COUNT" -gt 0 ] || { echo "No log streams returned — check Promtail is shipping loki namespace logs"; exit 1; }
              echo "Log ingestion confirmed: $STREAM_COUNT stream(s) found"

    - name: loki-retention-configured
      description: Loki compactor is running and 30-day retention is configured
      try:
        - script:
            timeout: 30s
            content: |
              # /config is proxied through the nginx gateway
              CONFIG=$(curl -sf http://192.168.0.220/config)
              echo "$CONFIG" | grep -q "retention_period" || { echo "retention_period not found in Loki config"; exit 1; }
              # Loki 3.x renders 720h as 30d in the config output; accept either format
              echo "$CONFIG" | grep -qE "720h|30d" || { echo "30-day retention not configured (expected 720h or 30d)"; exit 1; }
              echo "30-day retention confirmed"

    - name: grafana-loki-datasource-registered
      description: Grafana is healthy and Loki datasource config is applied via ArgoCD
      try:
        - script:
            timeout: 30s
            content: |
              GRAFANA_IP=$(kubectl get svc -n monitoring -l app.kubernetes.io/name=grafana \
                -o jsonpath='{.items[0].status.loadBalancer.ingress[0].ip}' 2>/dev/null)
              [ -n "$GRAFANA_IP" ] || { echo "Could not find Grafana LoadBalancer IP"; exit 1; }
              # Try authenticated API access first (admin credentials)
              GRAFANA_PASSWORD=$(kubectl get secret -n monitoring prometheus-stack-grafana \
                -o jsonpath='{.data.admin-password}' 2>/dev/null | base64 -d 2>/dev/null || echo "")
              if [ -n "$GRAFANA_PASSWORD" ]; then
                DATASOURCES=$(curl -sf "http://$GRAFANA_IP/api/datasources" \
                  -u "admin:$GRAFANA_PASSWORD" 2>/dev/null || echo "")
                if echo "$DATASOURCES" | grep -q '"type":"loki"'; then
                  echo "Loki datasource confirmed in Grafana (authenticated API)"
                  exit 0
                fi
              fi
              # Fall back: verify Grafana is healthy + monitoring-apps ArgoCD is Healthy
              # The grafana-only-values.yaml change is applied via ArgoCD selfHeal
              MONITORING_STATUS=$(kubectl get application monitoring-apps -n argocd \
                -o jsonpath='{.status.health.status}' 2>/dev/null)
              GRAFANA_HEALTH=$(curl -sf "http://$GRAFANA_IP/api/health" 2>/dev/null || echo "")
              echo "Grafana health: $GRAFANA_HEALTH"
              echo "monitoring-apps ArgoCD status: $MONITORING_STATUS"
              echo "$MONITORING_STATUS" | grep -q "Healthy" || { echo "monitoring-apps not Healthy; Grafana datasource sync uncertain"; exit 1; }
              echo "$GRAFANA_HEALTH" | grep -q "ok" || { echo "Grafana health check failed"; exit 1; }
              echo "Loki datasource indirectly confirmed via ArgoCD sync + Grafana health"
