apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: kgateway-healthy
spec:
  description: kgateway controller, GatewayClass, and shared Gateway are healthy
  concurrent: false
  timeouts:
    assert: 5m
    exec: 60s
  steps:
    - name: kgateway-apps-synced
      try:
        - assert:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Application
              metadata:
                name: kgateway
                namespace: argocd
              status:
                sync:
                  status: Synced
                health:
                  status: Healthy
    - name: gatewayclass-accepted
      try:
        - assert:
            resource:
              apiVersion: gateway.networking.k8s.io/v1
              kind: GatewayClass
              metadata:
                name: kgateway
              status:
                (conditions[?type == 'Accepted'].status | [0]): "True"
    - name: gateway-programmed-with-metallb-ip
      try:
        - assert:
            resource:
              apiVersion: gateway.networking.k8s.io/v1
              kind: Gateway
              metadata:
                name: cluster-gateway
                namespace: kgateway-system
              status:
                (conditions[?type == 'Programmed'].status | [0]): "True"
        - script:
            content: |
              IP=$(kubectl get gateway cluster-gateway -n kgateway-system \
                -o jsonpath='{.status.addresses[0].value}')
              [ "$IP" = "192.168.0.224" ] || { echo "Expected 192.168.0.224, got: $IP"; exit 1; }
              echo "Gateway IP confirmed: $IP"
    - name: pgadmin-certificate-ready
      try:
        - assert:
            resource:
              apiVersion: cert-manager.io/v1
              kind: Certificate
              metadata:
                name: pgadmin-tls
                namespace: kgateway-system
              status:
                (conditions[?type == 'Ready'].status | [0]): "True"
    - name: pgadmin-httproute-accepted
      try:
        - assert:
            resource:
              apiVersion: gateway.networking.k8s.io/v1
              kind: HTTPRoute
              metadata:
                name: pgadmin
                namespace: postgresql-system
              status:
                (parents[0].conditions[?type == 'Accepted'].status | [0]): "True"
    - name: pgadmin-reachable-via-gateway
      try:
        - script:
            timeout: 30s
            content: |
              # --resolve (not -H "Host:") is required — kgateway routes HTTPS
              # listeners by TLS SNI, which -H alone does not set (confirmed
              # empirically: -H "Host:" against the raw IP gets "Connection
              # reset by peer" during the TLS handshake, before HTTP is even
              # reached). --resolve sets both the connection target and SNI.
              STATUS=$(curl -sk -o /dev/null -w "%{http_code}" \
                --resolve pgadmin.verticon.com:443:192.168.0.224 \
                https://pgadmin.verticon.com)
              [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ] || \
                { echo "Expected 200/302, got: $STATUS"; exit 1; }
              echo "pgAdmin reachable via Gateway: $STATUS"
    - name: prometheus-certificate-ready
      try:
        - assert:
            resource:
              apiVersion: cert-manager.io/v1
              kind: Certificate
              metadata:
                name: prometheus-tls
                namespace: kgateway-system
              status:
                (conditions[?type == 'Ready'].status | [0]): "True"
    - name: prometheus-httproute-accepted
      try:
