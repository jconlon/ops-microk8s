apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: cluster-nodes-ready
spec:
  description: All 8 cluster nodes are Ready
  concurrent: false
  timeouts:
    assert: 1m
  steps:
  - name: all-nodes-ready
    try:
    - assert:
        resource:
          apiVersion: v1
          kind: Node
          metadata:
            name: mullet
          status:
            (conditions[?type=='Ready'].status | [0]): "True"
    - assert:
        resource:
          apiVersion: v1
          kind: Node
          metadata:
            name: trout
          status:
            (conditions[?type=='Ready'].status | [0]): "True"
    - assert:
        resource:
          apiVersion: v1
          kind: Node
          metadata:
            name: tuna
          status:
            (conditions[?type=='Ready'].status | [0]): "True"
    - assert:
        resource:
          apiVersion: v1
          kind: Node
          metadata:
            name: whale
          status:
            (conditions[?type=='Ready'].status | [0]): "True"
    - assert:
        resource:
          apiVersion: v1
          kind: Node
          metadata:
            name: gold
          status:
            (conditions[?type=='Ready'].status | [0]): "True"
    - assert:
        resource:
          apiVersion: v1
          kind: Node
          metadata:
            name: squid
          status:
            (conditions[?type=='Ready'].status | [0]): "True"
    - assert:
        resource:
          apiVersion: v1
          kind: Node
          metadata:
            name: puffer
          status:
            (conditions[?type=='Ready'].status | [0]): "True"
    - assert:
        resource:
          apiVersion: v1
          kind: Node
          metadata:
            name: carp
          status:
            (conditions[?type=='Ready'].status | [0]): "True"

  - name: puffer-powerkey-mitigations-applied
    description: puffer has ACPI power button suppressions configured (issue #59). Only checks static config (logind.conf, udev rule file) — the live sysfs `inhibited` state is intentionally NOT checked while the front panel board is physically disconnected (confirmed root cause, #59), since sysfs inhibit doesn't persist across reboots and there's no signal source to inhibit right now. Re-add a live-state check (plus a boot-persistent systemd one-shot to set it) if/when the panel is reconnected.
    try:
      - script:
          timeout: 60s
          content: |
            # NOTE: kubectl debug node ... --rm does not reliably return output through
            # command substitution in this environment (silently empty, false-passes —
            # this step always reported PASS regardless of actual host state until
            # fixed 2026-07-18, see issue #115 investigation). Use a plain hostPath-
            # mounted pod instead — fully deterministic, no output-capture ambiguity.
            NS=$(kubectl config view --minify -o jsonpath='{..namespace}')
            POD="puffer-powerkey-check-$$"
            kubectl delete pod "$POD" -n "$NS" --ignore-not-found >/dev/null 2>&1

            JSON=$(cat <<JSONEOF
            {"apiVersion":"v1","kind":"Pod","metadata":{"name":"$POD","namespace":"$NS"},"spec":{"restartPolicy":"Never","nodeName":"puffer","containers":[{"name":"check","image":"alpine:latest","command":["sh","-c","FAIL=0; grep -q 'HandlePowerKey=ignore' /host/etc/systemd/logind.conf && echo 'PASS HandlePowerKey=ignore' || { echo 'FAIL HandlePowerKey=ignore missing'; FAIL=1; }; grep -q 'HandlePowerKeyLongPress=ignore' /host/etc/systemd/logind.conf && echo 'PASS HandlePowerKeyLongPress=ignore' || { echo 'FAIL HandlePowerKeyLongPress=ignore missing'; FAIL=1; }; grep -q 'ATTR{inhibited}=\"1\"' /host/etc/udev/rules.d/99-ignore-power-button.udev && echo 'PASS udev rule uses kernel inhibit' || { echo 'FAIL udev rule missing or uses wrong method'; FAIL=1; }; grep -q 'Avocent' /host/etc/udev/rules.d/99-ignore-power-button.udev && echo 'PASS udev rule covers Avocent KVM device' || { echo 'FAIL udev rule missing Avocent KVM device'; FAIL=1; }; exit \$FAIL"],"volumeMounts":[{"name":"hostroot","mountPath":"/host","readOnly":true}]}],"volumes":[{"name":"hostroot","hostPath":{"path":"/","type":"Directory"}}]}}
            JSONEOF
            )
            echo "$JSON" | kubectl apply -f - >/dev/null

            PHASE=""
            for i in $(seq 1 20); do
              PHASE=$(kubectl get pod "$POD" -n "$NS" -o jsonpath='{.status.phase}' 2>/dev/null)
              { [ "$PHASE" = "Succeeded" ] || [ "$PHASE" = "Failed" ]; } && break
              sleep 2
            done

            RESULT=$(kubectl logs "$POD" -n "$NS" 2>/dev/null)
            kubectl delete pod "$POD" -n "$NS" --ignore-not-found >/dev/null 2>&1

            echo "$RESULT"
            [ -z "$RESULT" ] && { echo "FAIL: no output captured (phase=$PHASE)"; exit 1; }
            echo "$RESULT" | grep -q "^FAIL" && exit 1 || exit 0

  - name: control-plane-certs-valid
    description: Control-plane node certs (front-proxy-client, server) have >30 days remaining validity (issue #115 regression guard — whale's front-proxy-client.crt expired unnoticed for 5 weeks)
    try:
      - script:
          timeout: 150s
          content: |
            # NOTE: kubectl debug node ... does not reliably return output through
            # command substitution in this environment (silently empty, false-passes
            # the check). Use a plain hostPath-mounted pod instead — fully
            # deterministic, no output-capture ambiguity, and a single-line JSON
            # manifest avoids nested-heredoc/YAML-indentation issues.
            NS=$(kubectl config view --minify -o jsonpath='{..namespace}')
            FAIL=0
            for node in mullet trout whale; do
              POD="certcheck-$node-$$"
              kubectl delete pod "$POD" -n "$NS" --ignore-not-found >/dev/null 2>&1

              JSON=$(cat <<JSONEOF
            {"apiVersion":"v1","kind":"Pod","metadata":{"name":"$POD","namespace":"$NS"},"spec":{"restartPolicy":"Never","nodeName":"$node","containers":[{"name":"certcheck","image":"alpine:latest","command":["sh","-c","apk add --no-cache openssl -q 2>/dev/null; CFAIL=0; for cert in front-proxy-client.crt server.crt; do if openssl x509 -in /certs/\$cert -noout -checkend 2592000 2>/dev/null; then echo PASS \$cert; else echo FAIL \$cert; CFAIL=1; fi; done; exit \$CFAIL"],"volumeMounts":[{"name":"certs","mountPath":"/certs","readOnly":true}]}],"volumes":[{"name":"certs","hostPath":{"path":"/var/snap/microk8s/current/certs","type":"Directory"}}]}}
            JSONEOF
              )
              echo "$JSON" | kubectl apply -f - >/dev/null

              PHASE=""
              for i in $(seq 1 20); do
                PHASE=$(kubectl get pod "$POD" -n "$NS" -o jsonpath='{.status.phase}' 2>/dev/null)
                { [ "$PHASE" = "Succeeded" ] || [ "$PHASE" = "Failed" ]; } && break
                sleep 2
              done

              RESULT=$(kubectl logs "$POD" -n "$NS" 2>/dev/null)
              kubectl delete pod "$POD" -n "$NS" --ignore-not-found >/dev/null 2>&1

              echo "-- $node --"
              echo "$RESULT"
              [ -z "$RESULT" ] && { echo "FAIL $node: no output captured (phase=$PHASE)"; FAIL=1; continue; }
              echo "$RESULT" | grep -q "^FAIL" && FAIL=1
            done
            exit $FAIL
