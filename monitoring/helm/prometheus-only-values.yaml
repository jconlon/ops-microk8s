# prometheus-only-values.yaml
# Prometheus + Operator + Exporters only

prometheus:
  enabled: true
  prometheusSpec:
    # Storage configuration using Rook/Ceph for critical metrics data
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: rook-ceph-block # 3 replicas on Ceph
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 100Gi

    # Resource limits
    resources:
      limits:
        cpu: 2000m
        memory: 6Gi
      requests:
        cpu: 500m
        memory: 2Gi

    # Retention policy - keep within 40Gi of 100Gi allocation
    retention: 15d
    retentionSize: 40GB

    # Additional configuration for better performance
    walCompression: true
    enableFeatures:
      - exemplar-storage
      - memory-snapshot-on-shutdown

    # Limit max TSDB block size to reduce compaction memory spikes
    # and cap query sample count to prevent runaway queries
    additionalArgs:
      - name: storage.tsdb.max-block-duration
        value: 2h
      - name: query.max-samples
        value: "50000000"

    # Additional scrape configs (empty but required for some configurations)
    additionalScrapeConfigs: []

    # ServiceMonitor selector - match ALL ServiceMonitors cluster-wide
    # Setting to {} with nilUsesHelmValues=false prevents Helm from adding release label selector
    # This allows discovery of ServiceMonitors from any source (grafana, alertmanager, prometheus, ceph, etc.)
    serviceMonitorSelector: {}
    serviceMonitorSelectorNilUsesHelmValues: false

    # PrometheusRule selector - match ALL PrometheusRules cluster-wide
    ruleSelector: {}
    ruleSelectorNilUsesHelmValues: false

    # External URL configuration for LoadBalancer access
    externalUrl: "http://prometheus.verticon.com"

  # Prometheus service configuration for MetalLB
  service:
    type: LoadBalancer
    port: 80
    targetPort: 9090 # Internal Prometheus port
    annotations:
      metallb.universe.tf/loadBalancerIPs: "192.168.0.202"

# Enable operator and exporters
prometheusOperator:
  enabled: true
  resources:
    limits:
      cpu: 200m
      memory: 200Mi
    requests:
      cpu: 100m
      memory: 100Mi
  admissionWebhooks:
    enabled: false

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true

# Disable other components
grafana:
  enabled: false
alertmanager:
  enabled: false

# Default rules
defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: true
    configReloaders: true
    general: true
    k8s: true
    kubeApiserverAvailability: true
    kubeApiserverBurnrate: true
    kubeApiserverHistogram: true
    kubeApiserverSlos: true
    kubelet: true
    kubeProxy: true
    kubePrometheusGeneral: true
    kubePrometheusNodeRecording: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    kubeScheduler: true
    kubeStateMetrics: true
    network: true
    node: true
    nodeExporterAlerting: true
    nodeExporterRecording: true
    prometheus: true
    prometheusOperator: true

# Global configuration
global:
  rbac:
    create: true
    pspEnabled: false

# Disable unnecessary components for MicroK8s
kubeProxy:
  enabled: false
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeEtcd:
  enabled: false