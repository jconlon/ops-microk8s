# Custom replacement for the kagent chart's bundled observability-agent
# (disabled via observability-agent.enabled=false in kagent-values.yaml).
#
# The bundled version's 31-tool grafana-mcp toolset alone costs ~8,195 tokens
# in schema definitions — essentially the entire 8192-token vLLM context
# budget — causing every request to overflow before the system prompt,
# conversation, or response are even counted (issue #111). The chart exposes
# no values override for the tool list (it's hardcoded in the subchart
# template), so this CR fully replaces it with a curated ~2,886-token core
# set focused on read-only Prometheus querying + dashboard lookup, dropping
# oncall management, incident tracking, Sift investigations, alerting rules,
# Loki logs, and dashboard write/versioning/permissions (update_dashboard
# alone was ~1,124 tokens).
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: observability-agent
  namespace: kagent
spec:
  description: An Observability-oriented Agent specialized in querying Prometheus metrics and looking up Grafana dashboards, correlated with Kubernetes resource state.
  type: Declarative
  declarative:
    runtime: python
    systemMessage: |
      # Observability AI Agent System Prompt

      You are an advanced AI agent specialized in Kubernetes observability with expertise in Prometheus monitoring and Grafana dashboard lookup. You excel at helping users query metrics, find relevant dashboards, and troubleshoot Kubernetes environments.

      ## Core Capabilities

      - **Prometheus Expertise**: You understand PromQL, metric types, and how to query and interpret metrics.
      - **Grafana Dashboard Lookup**: You can find existing dashboards and inspect their panel queries.
      - **Kubernetes Observability**: You comprehend service monitoring, resource utilization patterns, and common performance bottlenecks.
      - **Metrics Interpretation**: You can analyze trends, anomalies, and correlations in observability data.

      {{include "builtin/kubernetes-context"}}

      {{include "builtin/tool-usage-best-practices"}}

      ## Available Tools

      You have access to the following tools:

        ### Prometheus Tools
        - `GeneratePromQLTool`: Create PromQL queries from natural language descriptions to extract specific metrics.
        - `query_prometheus`, `list_prometheus_metric_names`, `list_prometheus_metric_metadata`, `list_prometheus_label_names`, `list_prometheus_label_values`: Execute and introspect Prometheus queries directly.

        ### Grafana Tools (read-only)
        - `list_datasources`, `get_datasource`: Resolve datasource UIDs.
        - `search_dashboards`, `get_dashboard_by_uid`, `get_dashboard_panel_queries`: Find dashboards and inspect their panel queries.

        Note: this agent cannot create, update, or delete dashboards, manage alerting rules, oncall schedules, incidents, or search Loki logs — it is scoped to read-only metrics querying and dashboard lookup to fit within the model's context window.

      # Response format
      - ALWAYS format your response as Markdown
      - Your response will include a summary of actions you took and an explanation of the result
      - If you created any artifacts such as files or resources, you will include those in your response as well
    promptTemplate:
      dataSources:
        - kind: ConfigMap
          name: kagent-builtin-prompts
          alias: builtin
    modelConfig: default-model-config
    tools:
      - type: McpServer
        mcpServer:
          name: kagent-tool-server
          kind: RemoteMCPServer
          apiGroup: kagent.dev
          toolNames:
            - k8s_get_resources
            - k8s_get_available_api_resources
      - type: McpServer
        mcpServer:
          name: kagent-grafana-mcp
          kind: RemoteMCPServer
          apiGroup: kagent.dev
          toolNames:
            - query_prometheus
            - list_prometheus_metric_names
            - list_prometheus_metric_metadata
            - list_prometheus_label_values
            - list_prometheus_label_names
            - list_datasources
            - get_datasource
            - search_dashboards
            - get_dashboard_by_uid
            - get_dashboard_panel_queries
      - type: Agent
        agent:
          name: promql-agent
    a2aConfig:
      skills:
        - id: prometheus-monitoring-querying
          name: Prometheus Monitoring & Querying
          description: Assists with designing Prometheus monitoring strategies, generating PromQL queries (via promql-agent), executing queries, and interpreting metrics.
          tags:
            - prometheus
            - promql
            - monitoring
            - metrics
            - query
            - analysis
          examples:
            - "Generate a PromQL query to show the 99th percentile latency for 'my-service'."
            - "Execute this PromQL query and show me the results: `sum(rate(container_cpu_usage_seconds_total[5m])) by (pod)`"
            - "What are the key metrics I should monitor for a Kafka cluster?"

        - id: grafana-dashboard-lookup
          name: Grafana Dashboard Lookup
          description: Finds existing Grafana dashboards and inspects their panel queries. Read-only — cannot create, update, or manage permissions/versions.
          tags:
            - grafana
            - dashboard
            - search-dashboard
          examples:
            - "Find all Grafana dashboards related to 'nginx'."
            - "What queries does the 'Kubernetes Overview' dashboard use?"

        - id: kubernetes-observability-insights
          name: Kubernetes Observability Insights
          description: Provides insights into Kubernetes cluster and application health by correlating Kubernetes resource information with Prometheus metrics. Helps troubleshoot performance bottlenecks and resource utilization.
          tags:
            - kubernetes
            - observability
            - insights
            - troubleshooting
            - performance
            - resource-utilization
          examples:
            - "What's the current resource utilization (CPU/memory) of nodes tagged with 'workload=critical'?"
            - "Help me identify potential performance bottlenecks in my microservices deployment."
    deployment:
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 1000m
          memory: 256Mi
