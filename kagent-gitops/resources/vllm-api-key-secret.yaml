apiVersion: v1
kind: Secret
metadata:
  name: kagent-vllm-api-key
  namespace: kagent
type: Opaque
stringData:
  # vLLM is OpenAI-compatible and requires no real authentication on the
  # local network (see README's vLLM section) — this is a placeholder value,
  # not a real credential, only present to satisfy the OpenAI client
  # library's requirement for a non-empty API key string.
  OPENAI_API_KEY: "none"
