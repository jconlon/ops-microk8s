# KAgent control plane — issue #111
#
# v1 scope: internal-only (no kgateway HTTPRoute yet — see issue #111 comments
# for the deferred external-exposure decision).

kmcp:
  enabled: false

database:
  postgres:
    # Full postgres:// URL mounted from the kagent-db-credentials secret
    # (see teller/.teller-kagent.yml) — avoids a plaintext connection string
    # in git, matching this repo's secrets-handling convention elsewhere.
    urlFile: /etc/kagent/db/url
    bundled:
      enabled: false

controller:
  volumes:
    - name: db-credentials
      secret:
        secretName: kagent-db-credentials
  volumeMounts:
    - name: db-credentials
      mountPath: /etc/kagent/db
      readOnly: true

providers:
  default: openAI
  openAI:
    provider: OpenAI
    model: "Qwen/Qwen2.5-7B-Instruct-AWQ"
    # vLLM is OpenAI-compatible and requires no real auth (see README) —
    # apiKeySecretRef/Key below just satisfy the OpenAI client library's
    # requirement for a non-empty key string.
    apiKeySecretRef: kagent-vllm-api-key
    apiKeySecretKey: OPENAI_API_KEY
    config:
      baseUrl: http://vllm-router-service.vllm.svc.cluster.local/v1

# Chart default (grafana.kagent:3000/api) assumes Grafana runs in the same
# namespace — this cluster's Grafana is in monitoring, service port 80
# (targetPort 3000 internally). secretRef points at a Secret containing
# GRAFANA_SERVICE_ACCOUNT_TOKEN, created out-of-band (not in git — see
# scripts/README.md for the bootstrap command).
#
# MUST include an explicit scheme (http://) — without "//", Go's url.Parse
# treats the text before the first ":" as the scheme rather than a hostname
# (e.g. "grafana.monitoring:80/api" parses as scheme="grafana.monitoring",
# opaque="80/api", with an EMPTY host). This caused every Grafana API call
# to fail with "https:///api/...: no Host in request URL" — note the missing
# host, only a scheme (mcp-grafana silently defaulted to https when parsing
# failed, which was also wrong: this internal Grafana serves plain HTTP).
grafana-mcp:
  grafana:
    url: "http://grafana.monitoring:80/api"
    secretRef: kagent-grafana-token
  # The server's streamable-http transport rejects requests whose Host header
  # isn't in its allow-list (DNS-rebinding protection) — by default it only
  # allows loopback variants, so in-cluster requests from kagent-controller
  # (Host: kagent-grafana-mcp.kagent:8000) were rejected with 403 regardless
  # of the Grafana token being correct. Traffic here is entirely internal
  # cluster-to-cluster (never exposed externally), so disabling the check is
  # safe — same "minimum security, lab network" call as kagent's external
  # exposure (issue #111).
  args:
    - "--allowed-hosts"
    - "*"

# Replaced by a custom Agent CR (kagent-gitops/resources/observability-agent.yaml,
# deployed via kagent-resources) with a curated tool list — the bundled
# version's 31-tool grafana-mcp toolset alone overflows the vLLM context
# window (issue #111), and the chart exposes no values override for it.
observability-agent:
  enabled: false
