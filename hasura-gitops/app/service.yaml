apiVersion: v1
kind: Service
metadata:
  name: hasura
  namespace: hasura
  labels:
    app.kubernetes.io/name: hasura
    app.kubernetes.io/component: graphql-engine
  annotations:
    metallb.universe.tf/loadBalancerIPs: "192.168.0.217"
spec:
  type: LoadBalancer
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
  selector:
    app.kubernetes.io/name: hasura
