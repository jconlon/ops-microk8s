apiVersion: apps/v1
kind: Deployment
metadata:
  name: hasura
  namespace: hasura
  labels:
    app.kubernetes.io/name: hasura
    app.kubernetes.io/component: graphql-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hasura
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hasura
        app.kubernetes.io/component: graphql-engine
    spec:
      enableServiceLinks: false
      containers:
        - name: graphql-engine
          image: hasura/graphql-engine:v2.44.0
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: HASURA_GRAPHQL_METADATA_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: hasura-credentials
                  key: HASURA_GRAPHQL_METADATA_DATABASE_URL
            - name: HASURA_GRAPHQL_ADMIN_SECRET
              valueFrom:
                secretKeyRef:
                  name: hasura-credentials
                  key: HASURA_GRAPHQL_ADMIN_SECRET
            - name: HASURA_GRAPHQL_ENABLE_CONSOLE
              value: "true"
            - name: HASURA_GRAPHQL_DEV_MODE
              value: "false"
            - name: HASURA_GRAPHQL_ENABLED_LOG_TYPES
              value: "startup,http-log,webhook-log,websocket-log"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
