apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: image-build-push
  namespace: argo-workflows
spec:
  entrypoint: build-and-push
  serviceAccountName: argo-workflow
  arguments:
    parameters:
      - name: repo-url
      - name: revision
        value: main
      - name: image
      - name: context
        value: .
      - name: dockerfile
        value: Dockerfile
  templates:
    - name: build-and-push
      inputs:
        parameters:
          - name: repo-url
            value: "{{workflow.parameters.repo-url}}"
          - name: revision
            value: "{{workflow.parameters.revision}}"
          - name: image
            value: "{{workflow.parameters.image}}"
          - name: context
            value: "{{workflow.parameters.context}}"
          - name: dockerfile
            value: "{{workflow.parameters.dockerfile}}"
      volumes:
        - name: workspace
          emptyDir: {}
        - name: harbor-credentials
          secret:
            secretName: harbor-credentials
            items:
              - key: .dockerconfigjson
                path: config.json
      # Kaniko treats all https:// URLs as tar downloads regardless of .git suffix.
      # An init container clones the repo so Kaniko can use a local dir:// context.
      initContainers:
        - name: git-clone
          image: alpine/git:latest
          command:
            - git
            - clone
            - --depth=1
            - --branch
            - "{{inputs.parameters.revision}}"
            - "{{inputs.parameters.repo-url}}"
            - /workspace
          volumeMounts:
            - name: workspace
              mountPath: /workspace
      container:
        image: gcr.io/kaniko-project/executor:latest
        args:
          - --dockerfile={{inputs.parameters.dockerfile}}
          - --context=dir:///workspace
          - --context-sub-path={{inputs.parameters.context}}
          - --destination={{inputs.parameters.image}}
          - --cache=true
          - --cache-repo=registry.verticon.com/cache
        volumeMounts:
          - name: workspace
            mountPath: /workspace
          - name: harbor-credentials
            mountPath: /kaniko/.docker
