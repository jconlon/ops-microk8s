# One Certificate per migrated hostname — cert-manager solves the ACME DNS-01
# challenge via Cloudflare (ClusterIssuer's dns01.cloudflare solver; see
# docs/plans/2026-07-05-migrate-to-kgateway.md Architectural Decisions —
# *.verticon.com resolves to private LAN IPs, so HTTP-01 cannot work here).
# Blocked on issue #109 (Cloudflare API token bootstrap) until the
# ClusterIssuer is switched from its current interim http01 form.
# Once issued, writes the cert+key into the Secret named below — that Secret
# is what the Gateway's https-pgadmin listener references.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: pgadmin-tls
  namespace: kgateway-system
spec:
  secretName: pgadmin-tls
  dnsNames:
    - pgadmin.verticon.com
  issuerRef:
    name: letsencrypt-http01
    kind: ClusterIssuer
