project: dot
providers:
  google_secretmanager:
    env:
      APICURIO_DB_PASSWORD:
        path: projects/1000827005146/secrets/apicurio-db/versions/latest

# Creates two K8s secrets from the same GSM secret:
#
# 1. postgresql-system/apicurio-role-password  — CloudNativePG managed role
# 2. apicurio-registry/apicurio-db-credentials — Apicurio operator DB connection
#
# Prerequisites:
#   1. Create the GSM secret:
#        gcloud secrets create apicurio-db --replication-policy=automatic
#        echo -n "<password>" | gcloud secrets versions add apicurio-db --data-file=-
#   2. Ensure the apicurio-registry namespace exists (ArgoCD creates it on first sync)
#
# Usage (run from ops-microk8s/ directory):
#   teller run --config teller/.teller-apicurio.yml -- bash -c '
#     kubectl create secret generic apicurio-role-password \
#       -n postgresql-system \
#       --from-literal=password="$APICURIO_DB_PASSWORD" \
#       --dry-run=client -o yaml | kubectl apply -f -
#     kubectl create secret generic apicurio-db-credentials \
#       -n apicurio-registry \
#       --from-literal=password="$APICURIO_DB_PASSWORD" \
#       --dry-run=client -o yaml | kubectl apply -f -
#   '
