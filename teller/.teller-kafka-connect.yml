# Teller config for kafka-connect-secret in kafka-system namespace.
# Combines the freshrss PostgreSQL role password with Ceph RGW S3 credentials.
#
# Run once (or after credential rotation) to create/update the secret:
#
#   teller run --config teller/.teller-kafka-connect.yml -- bash -c '
#     kubectl create secret generic kafka-connect-secret \
#       --namespace kafka-system \
#       --from-literal=DB_PASSWORD="$DB_PASSWORD" \
#       --from-literal=AWS_ACCESS_KEY_ID="$AWS_ACCESS_KEY_ID" \
#       --from-literal=AWS_SECRET_ACCESS_KEY="$AWS_SECRET_ACCESS_KEY" \
#       --dry-run=client -o yaml | kubectl apply -f -
#   '

project: ops-microk8s

providers:
  google_secretmanager:
    env:
      DB_PASSWORD:
        path: projects/1000827005146/secrets/freshrss-role/versions/latest
      AWS_ACCESS_KEY_ID:
        path: projects/1000827005146/secrets/access-key-ceph-lab/versions/latest
      AWS_SECRET_ACCESS_KEY:
        path: projects/1000827005146/secrets/secret-key-ceph-lab/versions/latest
