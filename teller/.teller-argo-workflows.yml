# Teller config for Argo Workflows — Harbor robot account credentials
# Prerequisites: add harbor-argo-robot secret to Google Secret Manager
#
# Usage:
#   teller run --config teller/.teller-argo-workflows.yml -- bash -c '...'

project: ops-microk8s

providers:
  google_secretmanager:
    env_sync:
      HARBOR_ARGO_ROBOT_SECRET:
        path: harbor-argo-robot

