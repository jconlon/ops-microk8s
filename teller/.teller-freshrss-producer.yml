# Teller config for freshrss-producer — reuses the existing freshrss PostgreSQL role
# No new GSM secrets required; DB_USERNAME is the literal "freshrss".

project: ops-microk8s

providers:
  google_secretmanager:
    env:
      DB_PASSWORD:
        path: projects/1000827005146/secrets/freshrss-role/versions/latest

