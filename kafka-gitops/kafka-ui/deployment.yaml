apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-ui
  namespace: kafka-system
  labels:
    app.kubernetes.io/name: kafka-ui
    app.kubernetes.io/component: kafka-ui
    app.kubernetes.io/part-of: kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kafka-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kafka-ui
        app.kubernetes.io/component: kafka-ui
        app.kubernetes.io/part-of: kafka
    spec:
      enableServiceLinks: false
      containers:
        - name: kafka-ui
          image: provectuslabs/kafka-ui:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: KAFKA_CLUSTERS_0_NAME
              value: "kafka"
            - name: KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS
              value: "kafka-kafka-bootstrap.kafka-system.svc.cluster.local:9092"
            - name: KAFKA_CLUSTERS_0_SCHEMAREGISTRY
              value: "http://apicurio-registry-service.apicurio-registry.svc:8080/apis/ccompat/v6"
            - name: DYNAMIC_CONFIG_ENABLED
              value: "true"
