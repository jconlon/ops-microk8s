apiVersion: v1
kind: Service
metadata:
  name: kafka-ui
  namespace: kafka-system
  labels:
    app.kubernetes.io/name: kafka-ui
    app.kubernetes.io/component: kafka-ui
    app.kubernetes.io/part-of: kafka
  annotations:
    metallb.universe.tf/loadBalancerIPs: "192.168.0.222"
spec:
  type: LoadBalancer
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
  selector:
    app.kubernetes.io/name: kafka-ui
