---
# JDBC Source Connector — polls v_freshrss_entries view on the PostgreSQL read
# replica using timestamp+incrementing watermark and routes all records to
# freshrss.articles.raw via a RegexRouter SMT.
#
# Prerequisites:
#   - kafka-connect-secret must exist in kafka-system (see teller/.teller-kafka-connect.yml)
#   - v_freshrss_entries view must exist in the freshrss database
#   - Topic freshrss.articles.raw must exist (or auto-create enabled)
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaConnector
metadata:
  name: freshrss-jdbc-source
  namespace: kafka-system
  labels:
    strimzi.io/cluster: kafka-connect
spec:
  class: io.aiven.connect.jdbc.JdbcSourceConnector
  tasksMax: 1
  config:
    connection.url: "jdbc:postgresql://production-postgresql-ro.postgresql-system.svc.cluster.local:5432/freshrss"
    connection.user: "freshrss"
    connection.password: "${file:/mnt/connect-secret/DB_PASSWORD:DB_PASSWORD}"
    mode: "timestamp+incrementing"
    timestamp.column.name: "added_date"
    incrementing.column.name: "id"
    table.whitelist: "v_freshrss_entries"
    topic.prefix: ""
    poll.interval.ms: "60000"
    batch.max.rows: "500"
    # Route v_freshrss_entries → freshrss.articles.raw
    transforms: "topicRoute"
    transforms.topicRoute.type: "org.apache.kafka.connect.transforms.RegexRouter"
    transforms.topicRoute.regex: ".*"
    transforms.topicRoute.replacement: "freshrss.articles.raw"
    key.converter: "org.apache.kafka.connect.storage.StringConverter"
    value.converter: "org.apache.kafka.connect.json.JsonConverter"
    value.converter.schemas.enable: "false"

---
# S3 Sink Connector — consumes atom.entries Avro records and writes to Ceph RGW
# with time-based partitioning: atom-entries/year=YYYY/month=MM/day=dd/
#
# Prerequisites:
#   - kafka-connect-secret must contain AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY
#   - S3 bucket atom-entries must exist in Ceph RGW (s3.verticon.com)
#   - Topic atom.entries must exist and contain Avro-serialized records
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaConnector
metadata:
  name: atom-entries-s3-sink
  namespace: kafka-system
  labels:
    strimzi.io/cluster: kafka-connect
spec:
  class: io.aiven.kafka.connect.s3.AivenKafkaConnectS3SinkConnector
  tasksMax: 1
  config:
    topics: "atom.entries"
    aws.access.key.id: "${file:/mnt/connect-secret/AWS_ACCESS_KEY_ID:AWS_ACCESS_KEY_ID}"
    aws.secret.access.key: "${file:/mnt/connect-secret/AWS_SECRET_ACCESS_KEY:AWS_SECRET_ACCESS_KEY}"
    aws.s3.bucket.name: "atom-entries"
    aws.s3.region: "us-east-1"
    aws.s3.endpoint: "https://s3.verticon.com"
    aws.s3.path.style.access.enabled: "true"
    format.output.type: "json"
    file.compression.type: "none"
    file.name.prefix: ""
    file.name.template: "{{topic}}/year={{_time:YYYY}}/month={{_time:MM}}/day={{_time:dd}}/{{partition}}-{{start_offset}}"
    key.converter: "org.apache.kafka.connect.storage.StringConverter"
    value.converter: "org.apache.kafka.connect.json.JsonConverter"
    value.converter.schemas.enable: "false"
