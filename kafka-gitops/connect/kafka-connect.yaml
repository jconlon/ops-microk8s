apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaConnect
metadata:
  name: kafka-connect
  namespace: kafka-system
  annotations:
    # Enable KafkaConnector CRs to manage connectors declaratively
    strimzi.io/use-connector-resources: "true"
spec:
  version: 3.8.0
  replicas: 2
  bootstrapServers: kafka-kafka-bootstrap.kafka-system.svc.cluster.local:9092

  # Strimzi builds a custom image with the listed plugins and pushes to Harbor.
  # The build runs as a Pod in kafka-system using kaniko; re-triggers when
  # the plugins list changes.
  build:
    output:
      type: docker
      image: registry.verticon.com/library/kafka-connect:latest
      pushSecret: harbor-credentials
    plugins:
      # Aiven open-source JDBC connector (Apache 2.0 fork of the Confluent connector)
      # https://github.com/Aiven-Open/jdbc-connector-for-apache-kafka
      - name: kafka-connect-jdbc
        artifacts:
          - type: zip
            url: https://github.com/Aiven-Open/jdbc-connector-for-apache-kafka/releases/download/v6.10.0/jdbc-connector-for-apache-kafka-6.10.0.zip
          # PostgreSQL JDBC driver (bundled zip may not include it)
          - type: jar
            url: https://repo1.maven.org/maven2/org/postgresql/postgresql/42.7.3/postgresql-42.7.3.jar
      # Aiven open-source S3 Sink connector (supports S3-compatible storage like Ceph RGW)
      # https://github.com/Aiven-Open/cloud-storage-connectors-for-apache-kafka
      - name: kafka-connect-s3
        artifacts:
          - type: zip
            url: https://github.com/Aiven-Open/cloud-storage-connectors-for-apache-kafka/releases/download/v3.4.2/s3-sink-connector-for-apache-kafka-3.4.2.zip
      # TODO: add Avro converter with full dependency set (tracked in GitHub issue)
      # kafka-connect-avro-converter is a thin JAR requiring many transitive deps;
      # ship JSON converter for now and add Avro support as a follow-up.

  config:
    group.id: kafka-connect-cluster
    offset.storage.topic: kafka-connect-cluster-offsets
    config.storage.topic: kafka-connect-cluster-configs
    status.storage.topic: kafka-connect-cluster-status
    offset.storage.replication.factor: "3"
    config.storage.replication.factor: "3"
    status.storage.replication.factor: "3"
    # Default converters — use built-in JSON to keep worker startup simple.
    # Individual connectors override with Avro once Avro deps are fully bundled.
    key.converter: org.apache.kafka.connect.storage.StringConverter
    value.converter: org.apache.kafka.connect.json.JsonConverter
    value.converter.schemas.enable: "false"
    # DirectoryConfigProvider — reads Kubernetes-mounted secret files from a directory.
    # Each secret key becomes a file; ${directory:/mnt/connect-secret:KEY} reads the file.
    config.providers: directory
    config.providers.directory.class: org.apache.kafka.common.config.provider.DirectoryConfigProvider

  # Mounts kafka-connect-secret at /opt/kafka/external-configuration/connect-secret/
  # so FileConfigProvider can read credentials from files.
  # Create with: teller run --config teller/.teller-kafka-connect.yml -- bash -c '...'
  # See teller/.teller-kafka-connect.yml for instructions.
  template:
    buildPod:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values:
                      - tuna
    pod:
      volumes:
        - name: connect-secret
          secret:
            secretName: kafka-connect-secret
    connectContainer:
      volumeMounts:
        - name: connect-secret
          mountPath: /mnt/connect-secret

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 1Gi
