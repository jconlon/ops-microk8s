routerSpec:
  tag: "v0.1.11"
  serviceType: LoadBalancer
  serviceAnnotations:
    metallb.universe.tf/loadBalancerIPs: "192.168.0.218"

servingEngineSpec:
  runtimeClassName: "nvidia"
  strategy:
    type: Recreate

  modelSpec:
    - name: "qwen25-7b"
      repository: "vllm/vllm-openai"
      tag: "v0.20.2"
      modelURL: "Qwen/Qwen2.5-7B-Instruct-AWQ"
      replicaCount: 1

      requestCPU: 4
      requestMemory: "8Gi"
      requestGPU: 1

      pvcStorage: "50Gi"
      storageClass: "rook-ceph-block"

      vllmConfig:
        enableChunkedPrefill: false
        enablePrefixCaching: false
        maxModelLen: 8192
        dtype: "float16"
        extraArgs:
          - "--gpu-memory-utilization"
          - "0.85"
          - "--trust-remote-code"
          - "--quantization"
          - "awq"
          # Required for kagent's agents to use tool/function calling —
          # without these, the OpenAI-compatible API rejects tool_choice="auto"
          # with a 400 (issue #111). Qwen2.5's tokenizer_config.json already
          # includes Hermes-style tool-call templating, so no custom
          # --chat-template is needed.
          - "--enable-auto-tool-choice"
          - "--tool-call-parser"
          - "hermes"

      nodeSelectorTerms:
        - matchExpressions:
            - key: "gpu-class"
              operator: "In"
              values:
                - "rtx2000-ada"

      # To switch to a gated model (e.g. meta-llama/Meta-Llama-3.1-8B-Instruct):
      #   1. Add HF_TOKEN to Google Secret Manager as 'huggingface-token'
      #   2. Run: teller run --config teller/.teller-vllm.yml -- <kubectl create secret command>
      #   3. Set hf_token here or reference the existing secret
      #   4. Update modelURL above
