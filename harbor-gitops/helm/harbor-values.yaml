expose:
  type: loadBalancer
  loadBalancer:
    annotations:
      metallb.universe.tf/loadBalancerIPs: "192.168.0.219"
    ports:
      httpPort: 80
      httpsPort: 443
  tls:
    enabled: false

externalURL: https://registry.verticon.com

# Admin password and secret key sourced from harbor-credentials secret (created via teller)
existingSecretAdminPassword: harbor-credentials
existingSecretAdminPasswordKey: HARBOR_ADMIN_PASSWORD
existingSecretSecretKey: harbor-credentials

database:
  type: external
  external:
    host: production-postgresql-rw.postgresql-system.svc.cluster.local
    port: "5432"
    username: harbor
    coreDatabase: harbor
    existingSecret: harbor-db-credentials
    existingSecretKey: password

redis:
  type: internal

persistence:
  enabled: true
  resourcePolicy: keep
  persistentVolumeClaim:
    registry:
      storageClass: rook-ceph-block
      size: 5Gi
    jobservice:
      jobLog:
        storageClass: rook-ceph-block
        size: 1Gi
    redis:
      storageClass: rook-ceph-block
      size: 1Gi
    trivy:
      storageClass: rook-ceph-block
      size: 5Gi
  imageChartStorage:
    # Ceph RGW does not support redirect — required for S3-compatible backends
    disableredirect: true
    type: s3
    s3:
      region: us-east-1
      bucket: harbor-registry
      regionendpoint: http://rook-ceph-rgw-rook-ceph-rgw.rook-ceph.svc:80
      existingSecret: harbor-s3-credentials
      secure: false
      v4auth: true
      skipverify: false

# Trivy vulnerability scanner
trivy:
  enabled: true

# Jobservice uses in-memory log to avoid PVC
jobservice:
  jobLoggers:
    - database

# Prefer worker nodes (gold/squid/puffer/carp) over mullet (desktop/control-plane
# node with constrained root disk that caused DiskPressure evictions — see issue #78)
x-avoid-mullet-affinity: &avoid-mullet
  nodeAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
            - key: kubernetes.io/hostname
              operator: NotIn
              values:
                - mullet

# Single replica — scale up after validating storage
nginx:
  affinity: *avoid-mullet
  # PDB ensures at most 1 nginx unavailable during voluntary disruptions (drains etc.)
  podDisruptionBudget:
    maxUnavailable: 1
portal:
  replicas: 1
  affinity: *avoid-mullet
core:
  replicas: 1
  affinity: *avoid-mullet
jobservice:
  replicas: 1
  affinity: *avoid-mullet
registry:
  replicas: 1
  affinity: *avoid-mullet

metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    additionalLabels:
      release: prometheus-stack
