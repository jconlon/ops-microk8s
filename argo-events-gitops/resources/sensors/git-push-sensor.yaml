# Sensor — listens to the git-push EventSource and submits an Argo Workflow.
# Triggers the 'git-push-build' WorkflowTemplate in the 'argo-workflows' namespace.
# Passes 'repo' and 'commit' from the webhook JSON body as workflow parameters.
#
# RBAC: The sensor-sa ServiceAccount (created below) needs submit rights on
# workflows.argoproj.io in argo-workflows. See argo-events-resources-app for
# the ClusterRole + ClusterRoleBinding.
apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: git-push
  namespace: argo-events
spec:
  dependencies:
    - name: git-push-dep
      eventSourceName: git-push
      eventName: git-push
  triggers:
    - template:
        name: trigger-git-push-build
        argoWorkflow:
          # Submit to the argo-workflows namespace.
          namespace: argo-workflows
          # Reference the placeholder WorkflowTemplate.
          source:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Workflow
              metadata:
                generateName: git-push-
                namespace: argo-workflows
              spec:
                workflowTemplateRef:
                  name: git-push-build
                arguments:
                  parameters:
                    - name: repo
                      value: "placeholder"
                    - name: commit
                      value: "placeholder"
          operation: submit
          # Map webhook JSON fields to workflow parameters.
          parameters:
            - src:
                dependencyName: git-push-dep
                dataKey: body.repo
              dest: spec.arguments.parameters.0.value
            - src:
                dependencyName: git-push-dep
                dataKey: body.commit
              dest: spec.arguments.parameters.1.value
  # ServiceAccount used by the Sensor pod.
  # Must be under spec.template.serviceAccountName (not spec.serviceAccountName).
  # This is confirmed by official Argo Events examples (webhook.yaml, special-workflow-trigger.yaml).
  template:
    serviceAccountName: argo-events-sensor-sa
---
# ServiceAccount for the Sensor pod.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argo-events-sensor-sa
  namespace: argo-events
---
# ClusterRole: full access to workflows in argo-workflows namespace.
# The Argo Events Sensor needs create (to submit), get/list/watch (to track status),
# and update/patch (for retries and workflow finalizer management).
# Using "*" matches the official Argo Events RBAC example (rbac/sensor-rbac.yaml).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argo-events-workflow-submit
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["workflows", "workflowtemplates", "cronworkflows", "clusterworkflowtemplates"]
    verbs: ["*"]
---
# ClusterRoleBinding: bind the sensor SA to the ClusterRole.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argo-events-workflow-submit
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: argo-events-workflow-submit
subjects:
  - kind: ServiceAccount
    name: argo-events-sensor-sa
    namespace: argo-events
---
# WorkflowTemplate: generic placeholder that logs the push event.
# Real per-repo build logic replaces the 'echo' step when ready.
# Lives in argo-workflows so it is visible in the Argo Workflows UI.
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: git-push-build
  namespace: argo-workflows
spec:
  entrypoint: build
  arguments:
    parameters:
      - name: repo
      - name: commit
  templates:
    - name: build
      inputs:
        parameters:
          - name: repo
          - name: commit
      container:
        image: alpine:3.19
        command: [sh, -c]
        args:
          - |
            echo "git-push-build triggered"
            echo "  repo:   {{inputs.parameters.repo}}"
            echo "  commit: {{inputs.parameters.commit}}"
            echo "Replace this step with your actual build workflow."
