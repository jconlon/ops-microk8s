# EventBus — Kafka backend using the cluster's existing Strimzi Kafka deployment.
# Kafka is a cluster-wide resource (kafka-system namespace), so all app-namespace
# EventBus objects can point at the same broker without spinning up per-namespace NATS.
# Topics are auto-created by Argo Events per EventSource/Sensor pair.
apiVersion: argoproj.io/v1alpha1
kind: EventBus
metadata:
  name: default
  namespace: argo-events
spec:
  kafka:
    url: kafka-kafka-bootstrap.kafka-system.svc.cluster.local:9092
